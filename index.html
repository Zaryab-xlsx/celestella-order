  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Cinzel:wght@400;600&display=swap');

    :root {
      --gold: #C9A96E;
      --gold-light: #E8D5A3;
      --deep: #0A0A0F;
      --surface: #12121A;
      --text: #F5F0E8;
      --muted: #8A8070;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--deep);
      color: var(--text);
      font-family: 'Cormorant Garamond', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Starfield background */
    .stars {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }
    .star {
      position: absolute;
      border-radius: 50%;
      background: white;
      animation: twinkle var(--d) ease-in-out infinite;
      opacity: 0;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0; }
      50% { opacity: var(--o); }
    }

    /* Glow orb */
    .orb {
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(201,169,110,0.08) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 0;
      animation: pulse 4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
      50% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
    }

    /* Main card */
    .card {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 3rem 2.5rem;
      max-width: 420px;
      width: 92%;
      background: rgba(18, 18, 26, 0.7);
      border: 1px solid rgba(201, 169, 110, 0.2);
      border-radius: 4px;
      backdrop-filter: blur(20px);
      animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .brand-line {
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 0.35em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 1.2rem;
      opacity: 0;
      animation: fadeUp 0.8s 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .zodiac-icon {
      font-size: 3rem;
      display: block;
      margin-bottom: 0.8rem;
      opacity: 0;
      animation: fadeUp 0.8s 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      filter: drop-shadow(0 0 20px rgba(201,169,110,0.5));
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 2rem;
      line-height: 1.2;
      color: var(--text);
      margin-bottom: 0.5rem;
      opacity: 0;
      animation: fadeUp 0.8s 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    h1 em {
      font-style: italic;
      color: var(--gold-light);
    }

    .subtitle {
      font-size: 1rem;
      color: var(--muted);
      font-weight: 300;
      margin-bottom: 2rem;
      line-height: 1.6;
      opacity: 0;
      animation: fadeUp 0.8s 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2rem;
      opacity: 0;
      animation: fadeUp 0.8s 0.55s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(201,169,110,0.3), transparent);
    }
    .divider span {
      color: var(--gold);
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      font-family: 'Cinzel', serif;
    }

    /* CTA Button */
    .cta-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      width: 100%;
      padding: 1rem 1.5rem;
      background: linear-gradient(135deg, #C9A96E 0%, #E8D5A3 50%, #C9A96E 100%);
      background-size: 200% 200%;
      color: #0A0A0F;
      font-family: 'Cinzel', serif;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-decoration: none;
      border: none;
      border-radius: 2px;
      cursor: pointer;
      transition: all 0.3s ease;
      animation: fadeUp 0.8s 0.6s cubic-bezier(0.16, 1, 0.3, 1) both, shimmer 3s 2s ease-in-out infinite;
      position: relative;
      overflow: hidden;
    }
    @keyframes shimmer {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }
    .cta-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0);
      transition: background 0.3s;
    }
    .cta-btn:hover::after { background: rgba(255,255,255,0.1); }
    .cta-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 30px rgba(201,169,110,0.3); }
    .cta-btn:active { transform: translateY(0); }

    .wa-icon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    /* Redirect notice */
    .redirect-notice {
      margin-top: 1.5rem;
      font-size: 0.8rem;
      color: var(--muted);
      opacity: 0;
      animation: fadeUp 0.8s 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    /* Progress bar */
    .progress-wrap {
      margin-top: 1.2rem;
      height: 1px;
      background: rgba(201,169,110,0.1);
      border-radius: 1px;
      overflow: hidden;
      opacity: 0;
      animation: fadeUp 0.8s 0.8s forwards;
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--gold), var(--gold-light));
      animation: fill 3s 1.2s linear forwards;
    }
    @keyframes fill {
      to { width: 100%; }
    }

    /* Trust badges */
    .trust {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      margin-top: 2rem;
      opacity: 0;
      animation: fadeUp 0.8s 0.9s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    .badge {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3rem;
    }
    .badge-icon { font-size: 1.1rem; }
    .badge-text {
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      color: var(--muted);
      font-family: 'Cinzel', serif;
      text-transform: uppercase;
    }

    /* Footer */
    .footer {
      margin-top: 2rem;
      font-size: 0.7rem;
      color: rgba(138,128,112,0.4);
      letter-spacing: 0.1em;
      opacity: 0;
      animation: fadeUp 0.8s 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
  </style>

    <a class="cta-btn" id="waBtn" href="#" onclick="goToWhatsApp(event)">

      </svg>

    <div class="redirect-notice">Redirecting you automatically in <span id="countdown">3</span>s...</div>

    <div class="trust">
      <div class="badge">

  <script>
    // ── 1. Generate stars ──────────────────────────────────────────────
    const starsEl = document.getElementById('stars');
    for (let i = 0; i < 120; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      const size = Math.random() * 2 + 0.5;
      s.style.cssText = `
        width:${size}px; height:${size}px;
        top:${Math.random()*100}%; left:${Math.random()*100}%;
        --d:${2 + Math.random()*4}s;
        --o:${0.3 + Math.random()*0.7};
        animation-delay:${Math.random()*4}s;
      `;
      starsEl.appendChild(s);
    }

    // ── 2. Capture fbclid from URL ─────────────────────────────────────
    function getFbclid() {
      const params = new URLSearchParams(window.location.search);
      return params.get('fbclid') || '';
    }

    function setCookie(name, value, days) {
      const d = new Date();
      d.setTime(d.getTime() + days * 24 * 60 * 60 * 1000);
      document.cookie = `${name}=${value};expires=${d.toUTCString()};path=/;SameSite=Lax`;
    }

    const fbclid = getFbclid();
    if (fbclid) {
      setCookie('_fbclid', fbclid, 90);
      // Also store with timestamp for your order sheet
      setCookie('_fbclid_time', new Date().toISOString(), 90);
    }

    // ── 3. Build WhatsApp URL with fbclid reference ────────────────────
    function buildWhatsAppURL() {
      const phone = '923099556319';
      const ref = fbclid ? fbclid.substring(0, 20) : 'direct';
      const message = encodeURIComponent(
        `🌟 Assalam o Alaikum! I saw your ad and I'm interested in ordering.\n\n[ref:${ref}]`
      );
      return `https://wa.me/${phone}?text=${message}`;
    }

    // ── 4. Update button href ──────────────────────────────────────────
    document.getElementById('waBtn').href = buildWhatsAppURL();

    // ── 5. Countdown + auto redirect ──────────────────────────────────
    let count = 3;
    const countEl = document.getElementById('countdown');
    const timer = setInterval(() => {
      count--;
      if (countEl) countEl.textContent = count;
      if (count <= 0) {
        clearInterval(timer);
        window.location.href = buildWhatsAppURL();
      }
    }, 1000);

    // ── 6. Manual button click also fires InitiateCheckout ─────────────
    function goToWhatsApp(e) {
      e.preventDefault();
      clearInterval(timer);
      if (typeof fbq !== 'undefined') {
        fbq('track', 'InitiateCheckout', {
          content_name: 'Celestella WhatsApp Order',
          currency: 'PKR',
          value: 1500
        });
      }
      setTimeout(() => { window.location.href = buildWhatsAppURL(); }, 200);
    }
  </script>
